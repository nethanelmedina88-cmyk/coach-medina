<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#13161b">
<meta name="description" content="Coach Medina · פלטפורמת ליווי אישי — אימונים, תזונה, מעקב והתקדמות">
<title>Coach Medina · פלטפורמת אימון אישי</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Coach Medina">
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#13161b;
  --panel:#1a1e25;
  --panel2:#232935;
  --line:#2b313b;
  --gline:rgba(201,163,95,.32);
  --text:#efeade;
  --muted:#9a9280;
  --gold:#c9a35f;
  --goldhi:#e9d6ab;
  --ember:#d4af6a;
  --red:#b8372a;
  --fire:linear-gradient(135deg,#8a6a33 0%,#c9a35f 52%,#eedfb4 100%);
  --goldline:linear-gradient(90deg,transparent,rgba(201,163,95,.55),transparent);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:'Assistant',sans-serif;min-height:100vh;background-image:radial-gradient(ellipse 900px 420px at 50% -80px,rgba(201,163,95,.06),transparent),repeating-linear-gradient(135deg,rgba(255,255,255,.008) 0 2px,transparent 2px 9px)}
h1,h2,h3{font-family:'Assistant',sans-serif;font-weight:800;letter-spacing:.5px}
.num,.code,.brand{font-family:'Assistant',sans-serif;font-variant-numeric:tabular-nums}
button{font-family:'Assistant',sans-serif;cursor:pointer;font-size:14px}
input,select,textarea{font-family:'Assistant',sans-serif;background:#111419;border:1px solid var(--line);color:var(--text);border-radius:6px;padding:10px 12px;font-size:16px;width:100%;-webkit-appearance:none;appearance:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
label{font-size:11px;color:var(--muted);display:block;margin-bottom:5px;letter-spacing:.5px}
.eyebrow{font-size:10px;letter-spacing:4px;color:var(--gold);font-weight:700;text-transform:uppercase}
/* ---------- login ---------- */
.login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px;text-align:center;position:relative}
.login::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 640px 480px at 50% 22%,rgba(201,163,95,.12),transparent);pointer-events:none}
.logowrap{position:relative;padding:8px;margin-bottom:18px}
.logowrap::before,.logowrap::after{content:"";position:absolute;width:26px;height:26px;border:1px solid var(--gold)}
.logowrap::before{top:0;right:0;border-left:none;border-bottom:none}
.logowrap::after{bottom:0;left:0;border-right:none;border-top:none}
.login img{width:180px;height:180px;object-fit:cover;display:block;filter:drop-shadow(0 0 34px rgba(201,163,95,.35))}
.login .brand{font-size:30px;font-weight:800;letter-spacing:4px;background:var(--fire);-webkit-background-clip:text;background-clip:text;color:transparent}
.login .tag{font-size:11px;letter-spacing:5px;color:var(--gold);margin:8px 0 6px;font-weight:500}
.login .subtag{font-size:13px;color:var(--muted);margin-bottom:30px}
.hairline{width:210px;height:1px;background:var(--goldline);margin:0 auto 26px}
.rolebox{background:var(--panel);border:1px solid var(--gline);border-radius:4px;padding:28px 26px;width:100%;max-width:380px;position:relative}
.rolebox h2{font-size:19px;margin-bottom:18px;font-weight:700}
.roles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
.rolebtn{background:var(--panel2);border:1px solid var(--line);border-radius:4px;padding:20px 10px;color:var(--text);font-size:15px;font-weight:700;transition:.18s}
.rolebtn:hover{border-color:var(--gold);background:#232935}
.rolebtn span{display:block;font-size:11px;color:var(--muted);font-weight:400;margin-top:5px}
.contact{margin-top:30px;font-size:13px;color:var(--muted);display:flex;gap:22px;flex-wrap:wrap;justify-content:center;direction:ltr}
.contact b{color:var(--gold);font-weight:700}
.err{color:#ff8d70;font-size:13px;min-height:18px;margin-top:8px}
/* ---------- shell ---------- */
.app{display:flex;min-height:100vh}
.side{width:232px;background:var(--panel);border-left:1px solid var(--line);padding:22px 15px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh}
.side .logoline{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.side img{width:52px;height:52px;object-fit:cover;border:1px solid var(--gline)}
.brand{font-weight:800;font-size:17px;letter-spacing:1.5px;background:var(--fire);-webkit-background-clip:text;background-clip:text;color:transparent}
.tag{font-size:8.5px;letter-spacing:2.8px;color:var(--gold);margin-bottom:18px;font-weight:500}
.sidesep{height:1px;background:var(--goldline);margin:4px 0 12px}
.navbtn{display:flex;align-items:center;gap:11px;background:none;border:none;color:var(--muted);padding:12px;border-radius:4px;font-size:15px;text-align:right;width:100%;transition:.15s}
.navbtn svg{width:17px;height:17px;flex:none;stroke:currentColor;fill:none;stroke-width:1.8}
.navbtn:hover{color:var(--text);background:var(--panel2)}
.navbtn.on{color:var(--goldhi);background:var(--panel2);box-shadow:inset 3px 0 0 var(--gold)}
.side .foot{margin-top:auto;font-size:11px;color:#6d5f4c;line-height:1.9}
.side .foot b{color:var(--gold)}
.main{flex:1;padding:30px 36px;max-width:1140px;width:100%}
.head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap}
.head h1{font-size:26px}
.head .sub{color:var(--muted);font-size:13px;margin-top:4px}
.btn{background:var(--fire);color:#171204;border:none;border-radius:4px;padding:11px 20px;font-weight:900;letter-spacing:.3px;transition:.15s}
.btn:hover{filter:brightness(1.1)}
.btn.ghost{background:transparent;border:1px solid var(--gline);color:var(--goldhi);font-weight:500}
.btn.ghost:hover{background:var(--panel2)}
.btn.sm{padding:7px 13px;font-size:13px}
.btn.danger{background:none;border:1px solid var(--line);color:var(--red)}
/* ---------- cards ---------- */
.grid{display:grid;gap:14px}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:20px;position:relative}
.card.gold{border-color:var(--gline)}
.card.gold::before{content:"";position:absolute;top:-1px;right:14px;left:14px;height:1px;background:var(--goldline)}
.stat{display:flex;align-items:center;gap:14px}
.stat .num{font-size:30px;font-weight:800}
.stat .lbl{font-size:12px;color:var(--muted);margin-top:2px}
.stat.hot .num{background:var(--fire);-webkit-background-clip:text;background-clip:text;color:transparent}
.statring{flex:none}
/* client cards */
.clist{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:14px}
.ccard{background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:18px;cursor:pointer;position:relative;overflow:hidden;transition:.18s}
.ccard:hover{border-color:var(--gold);transform:translateY(-2px)}
.ccard::before{content:"";position:absolute;top:0;right:0;bottom:0;width:3px;background:var(--fire)}
.ccard h3{font-size:18px;margin:6px 0 3px}
.ccard .goal{font-size:12px;color:var(--muted);margin-bottom:14px}
.ccard .row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);border-top:1px solid var(--line);padding-top:11px}
.ccard .row b{color:var(--goldhi)}
.chip{display:inline-block;font-size:10.5px;letter-spacing:1px;padding:3px 11px;border-radius:2px;background:rgba(201,163,95,.1);border:1px solid var(--gline);color:var(--gold)}
.code{font-weight:800;letter-spacing:4px;color:var(--goldhi);background:rgba(201,163,95,.08);border:1px dashed var(--gold);border-radius:3px;padding:7px 15px;display:inline-block;direction:ltr}
/* tabs */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:22px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{background:none;border:none;color:var(--muted);padding:12px 16px;font-size:14px;border-bottom:2px solid transparent;white-space:nowrap;letter-spacing:.3px}
.tab.on{color:var(--goldhi);border-bottom-color:var(--gold);font-weight:700}
/* table */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:right;color:var(--gold);font-weight:500;padding:8px 10px;border-bottom:1px solid var(--gline);font-size:11px;letter-spacing:1px}
td{padding:10px;border-bottom:1px solid #211b14;vertical-align:top}
tr:last-child td{border-bottom:none}
/* sliders / bars */
.sl{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.sl label{margin:0;width:80px;font-size:13px;color:var(--text)}
.sl input[type=range]{flex:1;accent-color:var(--ember);padding:0;border:none;background:none;min-height:26px}
.sl .v{width:26px;text-align:center;font-weight:800;font-variant-numeric:tabular-nums;color:var(--goldhi)}
.bar{height:6px;background:#232935;border-radius:99px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--fire);border-radius:99px}
/* misc */
.frow{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:12px}
.empty{text-align:center;color:var(--muted);padding:42px 18px;font-size:14px}
.empty b{display:block;color:var(--text);font-size:17px;margin-bottom:6px;font-weight:800}
.mut{color:var(--muted);font-size:12px}
.sect{font-size:16px;font-weight:800;margin:24px 0 12px;display:flex;align-items:center;gap:10px;letter-spacing:.5px}
.sect svg{width:16px;height:16px;stroke:var(--gold);fill:none;stroke-width:1.8;flex:none}
.sect::after{content:"";flex:1;height:1px;background:var(--goldline)}
.back{background:none;border:none;color:var(--muted);font-size:13px;padding:0;margin-bottom:14px}
.back:hover{color:var(--goldhi)}
.exline{display:grid;grid-template-columns:2fr 64px 70px 84px 34px;gap:8px;margin-bottom:8px;align-items:center}
.mealline{display:grid;grid-template-columns:140px 1fr 34px;gap:8px;margin-bottom:8px;align-items:center}
.prline{display:grid;grid-template-columns:1.5fr 90px 120px 34px;gap:8px;margin-bottom:8px;align-items:center}
.xdel{background:none;border:1px solid var(--line);color:var(--red);border-radius:4px;height:34px;min-width:34px;font-size:14px}
svg.chart{width:100%;height:190px;display:block}
.legend{display:flex;gap:16px;font-size:12px;color:var(--muted);margin-top:8px}
.dot{display:inline-block;width:9px;height:9px;border-radius:99px;background:var(--ember);margin-inline-start:5px}
.toast{position:fixed;bottom:22px;right:50%;transform:translateX(50%) translateY(10px);background:var(--panel2);border:1px solid var(--gold);color:var(--text);padding:12px 24px;border-radius:4px;font-size:14px;opacity:0;transition:.35s cubic-bezier(.22,.8,.35,1);pointer-events:none;z-index:50;max-width:88vw;text-align:center;box-shadow:0 8px 26px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateX(50%) translateY(0)}
.planblock{border:1px solid var(--line);border-radius:4px;padding:16px;margin-bottom:12px;background:var(--panel);position:relative}
.planblock::before{content:"";position:absolute;top:0;right:0;width:38px;height:1px;background:var(--gold)}
.planblock h3{font-size:16px;margin-bottom:2px}
.planblock .mut{margin-bottom:10px;display:block}
.checkrow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.checkrow input[type=checkbox]{width:20px;height:20px;accent-color:var(--ember);flex:none}
.ringrow{display:flex;gap:16px;flex-wrap:wrap;justify-content:space-around;padding:6px 0}
.ringbox{text-align:center}
.ringbox .rl{font-size:11px;color:var(--muted);margin-top:5px}
.prcard{display:flex;align-items:center;gap:12px;border:1px solid var(--gline);border-radius:4px;padding:13px 15px;margin-bottom:9px;background:rgba(201,163,95,.05)}
.prcard .prname{font-weight:700;font-size:14px}
.prcard .prkg{margin-inline-start:auto;font-weight:800;font-size:19px;font-variant-numeric:tabular-nums;color:var(--goldhi)}
.prcard .prkg small{font-size:11px;color:var(--muted);font-weight:400}
/* ---------- luxury motion ---------- */
.brand,.login .brand{background-image:linear-gradient(110deg,#8a6a33,#c9a35f 32%,#f6eccd 50%,#c9a35f 68%,#8a6a33);background-size:220% 100%;animation:shimmer 7s ease-in-out infinite}
@keyframes shimmer{0%,100%{background-position:200% 50%}50%{background-position:0% 50%}}
@keyframes rise{from{opacity:0;transform:translateY(14px)}}
@keyframes fadein{from{opacity:0}}
/* login entrance */
#root.anim .login .brand,#root.anim .login .tag,#root.anim .login .subtag{animation:rise .7s cubic-bezier(.22,.8,.35,1) both,shimmer 7s ease-in-out infinite}
#root.anim .login .tag{animation-delay:.08s}
#root.anim .login .subtag{animation-delay:.16s}
#root.anim .rolebox{animation:rise .7s .15s cubic-bezier(.22,.8,.35,1) both}
#root.anim .hairline{animation:hairgrow 1.1s .3s cubic-bezier(.22,.8,.35,1) both}
@keyframes hairgrow{from{transform:scaleX(0)}}
#root.anim .logowrap::before,#root.anim .logowrap::after{animation:fadein 1s .4s ease both}
.login img{animation:glowpulse 4.5s ease-in-out infinite}
@keyframes glowpulse{0%,100%{filter:drop-shadow(0 0 20px rgba(201,163,95,.22))}50%{filter:drop-shadow(0 0 46px rgba(201,163,95,.5))}}
/* floating embers */
.embers{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.embers i{position:absolute;bottom:-10px;width:4px;height:4px;border-radius:50%;background:var(--gold);opacity:0;filter:blur(.5px);box-shadow:0 0 9px 1px rgba(201,163,95,.55);animation:ember linear infinite}
@keyframes ember{0%{transform:translateY(0) scale(1);opacity:0}8%{opacity:.55}60%{opacity:.3}100%{transform:translateY(-105vh) scale(.35);opacity:0}}
/* view entrance (only on navigation, not on data refresh) */
#root.anim .main .head{animation:rise .5s cubic-bezier(.22,.8,.35,1) both}
#root.anim .main .card,#root.anim .ccard,#root.anim .planblock,#root.anim .prcard{animation:rise .55s cubic-bezier(.22,.8,.35,1) both}
#root.anim .grid>*:nth-child(1),#root.anim .clist>*:nth-child(1){animation-delay:.04s}
#root.anim .grid>*:nth-child(2),#root.anim .clist>*:nth-child(2){animation-delay:.1s}
#root.anim .grid>*:nth-child(3),#root.anim .clist>*:nth-child(3){animation-delay:.16s}
#root.anim .grid>*:nth-child(4),#root.anim .clist>*:nth-child(4){animation-delay:.22s}
#root.anim .grid>*:nth-child(5),#root.anim .clist>*:nth-child(5){animation-delay:.28s}
#root.anim .grid>*:nth-child(n+6),#root.anim .clist>*:nth-child(n+6){animation-delay:.34s}
/* gauges, bars, chart */
#root.anim .ringfg{animation:ringfill 1.1s .15s cubic-bezier(.22,.8,.35,1) both}
@keyframes ringfill{from{stroke-dasharray:0 999}}
#root.anim .bar i{animation:barfill .9s .25s cubic-bezier(.22,.8,.35,1) both}
@keyframes barfill{from{width:0}}
#root.anim svg.chart polyline{stroke-dasharray:1;stroke-dashoffset:1;animation:chartdraw 1.3s .2s ease-out forwards}
@keyframes chartdraw{to{stroke-dashoffset:0}}
#root.anim svg.chart circle{opacity:0;animation:fadein .5s ease-out forwards;animation-delay:calc(.3s + var(--i,0)*.09s)}
/* gold button sheen */
.btn{position:relative;overflow:hidden}
.btn:not(.ghost):not(.danger)::after{content:"";position:absolute;top:0;bottom:0;width:46%;left:-70%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.5),transparent);transform:skewX(-20deg)}
.btn:not(.ghost):not(.danger):hover::after{animation:sheen .7s ease}
@keyframes sheen{to{left:125%}}
/* hover polish */
.ccard{transition:transform .25s cubic-bezier(.22,.8,.35,1),border-color .25s,box-shadow .25s}
.ccard:hover{box-shadow:0 12px 30px rgba(0,0,0,.45),0 0 0 1px rgba(201,163,95,.22)}
.navbtn{transition:color .2s,background .2s,box-shadow .2s}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
@media(max-width:820px){
  .app{flex-direction:column}
  .side{width:100%;height:auto;position:static;flex-direction:row;align-items:center;flex-wrap:wrap;padding:10px 12px;gap:3px}
  .side .logoline{margin:0}
  .side img{width:36px;height:36px}
  .brand{font-size:13px}
  .tag,.side .foot,.sidesep{display:none}
  .navbtn{width:auto;padding:8px;font-size:13px;gap:6px}
  .navbtn svg{display:none}
  .main{padding:17px 13px}
  .g3,.g2{grid-template-columns:1fr}
  .exline{grid-template-columns:1fr 52px 60px 66px 34px}
  .mealline{grid-template-columns:104px 1fr 34px}
  .prline{grid-template-columns:1fr 74px 104px 34px}
  .head h1{font-size:21px}
}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-analytics-compat.js"></script>
<script src="firebase-config.js"></script>
<script>

/* =============== state =============== */
var db={clients:[]};
var role=null, myId=null, view="dash", cid=null, tab="overview";

/* =============== utils =============== */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function genCode(){ var s="",A="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; for(var i=0;i<6;i++) s+=A[Math.floor(Math.random()*A.length)]; return s; }
function today(){ var d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function fmtD(d){ if(!d) return "—"; var p=d.split("-"); return p[2]+"."+p[1]+"."+p[0].slice(2); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];}); }
function toast(m){ var t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(function(){t.classList.remove("show");},2600); }
function C(){ var id=role==="client"?myId:cid; for(var i=0;i<db.clients.length;i++) if(db.clients[i].id===id) return db.clients[i]; return null; }
function gv(id){ var e=document.getElementById(id); return e? e.value.trim():""; }
function normalize(c){
  c.weights=c.weights||[]; c.checkins=c.checkins||[]; c.habits=c.habits||[];
  c.workout=c.workout||[]; c.nutrition=c.nutrition||{calories:"",protein:"",carbs:"",fat:"",meals:[]};
  c.nutrition.meals=c.nutrition.meals||[]; c.prs=c.prs||[];
  return c;
}

/* =============== Firebase layer (Auth + Firestore, localStorage fallback) =============== */
var FB={on:false,db:null,auth:null,unsub:null,analytics:null};
function fbConfigured(){
  var c=window.FIREBASE_CONFIG;
  return !!(c && c.apiKey && c.apiKey.indexOf("PASTE")!==0 && typeof firebase!=="undefined");
}
function fbInit(){
  if(!fbConfigured()) return Promise.resolve(false);
  try{
    firebase.initializeApp(window.FIREBASE_CONFIG);
    FB.auth=firebase.auth();
    FB.db=firebase.firestore();
    /* Google Analytics — activates only when a measurementId is present in the config */
    try{ if(window.FIREBASE_CONFIG.measurementId && firebase.analytics){ FB.analytics=firebase.analytics(); } }catch(e){}
    try{ FB.db.enablePersistence({synchronizeTabs:true}).catch(function(){}); }catch(e){}
    return FB.auth.signInAnonymously().then(function(){ FB.on=true; return true; })
      .catch(function(){ toast("החיבור לענן נכשל, עובד במצב מקומי"); return false; });
  }catch(e){ return Promise.resolve(false); }
}
/* Google Analytics event helper — safe no-op until analytics is active */
function track(evt,params){ try{ if(FB.analytics) FB.analytics.logEvent(evt,params||{}); }catch(e){} }
/* realtime sync: every change any device writes lands here */
function startSync(){
  return new Promise(function(resolve){
    var first=true;
    FB.unsub=FB.db.collection("clients").onSnapshot(function(snap){
      var arr=[];
      snap.forEach(function(d){ var c=d.data(); c.id=d.id; arr.push(normalize(c)); });
      arr.sort(function(a,b){ return (a.createdAt||0)-(b.createdAt||0); });
      db.clients=arr;
      if(first){ first=false; resolve(); } else safeRender();
    },function(){ if(first){ first=false; resolve(); } toast("שגיאת סנכרון, בדוק חיבור"); });
  });
}
/* localStorage fallback (works before Firebase is configured) */
function lsLoad(){ try{ var v=localStorage.getItem(KEY); if(v){ var d=JSON.parse(v); if(d&&d.clients){ d.clients.forEach(normalize); db=d; } } }catch(e){} }
function lsSave(){ try{ localStorage.setItem(KEY,JSON.stringify(db)); }catch(e){} }
/* re-render that never steals focus from a field being typed in */
var pendingRender=false;
function formFocused(){ var a=document.activeElement; return !!(a && (a.tagName==="INPUT"||a.tagName==="TEXTAREA"||a.tagName==="SELECT")); }
function safeRender(){ if(formFocused()){ pendingRender=true; return; } render(); }
document.addEventListener("focusout",function(){ setTimeout(function(){ if(pendingRender && !formFocused()){ pendingRender=false; render(); } },80); });
/* PIN */
function getPin(){
  if(!FB.on){ var p=null; try{ p=localStorage.getItem(PINKEY); }catch(e){} return Promise.resolve(p||DEFAULT_PIN); }
  return FB.db.collection("meta").doc("settings").get().then(function(s){ return (s.exists&&s.data().pin)||DEFAULT_PIN; }).catch(function(){ return DEFAULT_PIN; });
}
function savePin(p){
  if(!FB.on){ try{ localStorage.setItem(PINKEY,p); }catch(e){} return Promise.resolve(true); }
  return FB.db.collection("meta").doc("settings").set({pin:p},{merge:true}).then(function(){ return true; })
    .catch(function(){ toast("שגיאת שמירה, בדוק חיבור"); return false; });
}
/* client mutations: optimistic local apply + serialized Firestore transaction,
   so coach and client never overwrite each other */
function clientRef(id){ return FB.db.collection("clients").doc(id); }
var mq=Promise.resolve();
function mutateClient(fn){
  var id=role==="client"?myId:cid;
  var local=null; for(var i=0;i<db.clients.length;i++) if(db.clients[i].id===id) local=db.clients[i];
  if(!id||!local) return Promise.resolve();
  try{ fn(local); }catch(e){ toast("שגיאה בעדכון"); }
  if(!FB.on){ lsSave(); render(); return Promise.resolve(); }
  render();
  mq=mq.then(function(){
    return FB.db.runTransaction(function(tx){
      var ref=clientRef(id);
      return tx.get(ref).then(function(snap){
        if(!snap.exists) return;
        var c=normalize(snap.data()); c.id=id;
        try{ fn(c); }catch(e){}
        var data=Object.assign({},c); delete data.id;
        tx.set(ref,data);
      });
    }).catch(function(){ toast("שגיאת שמירה, בדוק חיבור ונסה שוב"); });
  });
  return Promise.resolve();
}
function saveNewClient(c){
  db.clients.push(c);
  if(!FB.on){ lsSave(); return; }
  var data=Object.assign({},c); delete data.id;
  clientRef(c.id).set(data).catch(function(){ toast("שגיאת שמירה, בדוק חיבור"); });
}
function removeClient(id){
  db.clients=db.clients.filter(function(x){ return x.id!==id; });
  if(!FB.on){ lsSave(); return Promise.resolve(); }
  return clientRef(id).delete().catch(function(){ toast("שגיאת מחיקה, בדוק חיבור"); });
}

function syncBadge(){
  return '<div style="margin-top:8px;font-size:10px;letter-spacing:.5px;color:'+(FB.on?'var(--gold)':'#7d7464')+'">'
  +(FB.on?'☁ מסונכרן בענן':'○ מצב מקומי · ללא ענן')+'</div>';
}

/* =============== session (device-local) =============== */
function saveSession(){ try{ localStorage.setItem(SESKEY,JSON.stringify({role:role,myId:myId})); }catch(e){} }
function logout(){ track("logout",{role:role||"unknown"}); role=null; myId=null; view="dash"; cid=null; try{ localStorage.removeItem(SESKEY); }catch(e){} animNext=true; render(); }

/* =============== boot =============== */
function boot(){
  fbInit().then(function(ok){
    return ok? startSync() : Promise.resolve(lsLoad());
  }).then(function(){
    var ses=null; try{ ses=localStorage.getItem(SESKEY); }catch(e){}
    if(ses){ try{ var s=JSON.parse(ses); if(s&&s.role){ role=s.role; myId=s.myId||null;
      if(role==="client"){ var ok=false; for(var i=0;i<db.clients.length;i++) if(db.clients[i].id===myId) ok=true; if(!ok){ role=null; myId=null; } }
      if(role==="client") view="chome";
    } }catch(e){} }
    render();
  });
}

/* =============== ring gauge (signature element) =============== */
function ring(val,max,size,label,unit){
  size=size||74;
  var pct=Math.max(0,Math.min(1,max? val/max:0));
  var r=(size/2)-6, cxy=size/2, circ=2*Math.PI*r;
  var gid="rg"+Math.random().toString(36).slice(2,7);
  return '<div class="ringbox"><svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" style="transform:rotate(-90deg)">'
  +'<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8a6a33"/><stop offset=".55" stop-color="#c9a35f"/><stop offset="1" stop-color="#eedfb4"/></linearGradient></defs>'
  +'<circle cx="'+cxy+'" cy="'+cxy+'" r="'+r+'" stroke="#232935" stroke-width="6" fill="none"/>'
  +'<circle class="ringfg" cx="'+cxy+'" cy="'+cxy+'" r="'+r+'" stroke="url(#'+gid+')" stroke-width="6" fill="none" stroke-linecap="round" stroke-dasharray="'+(circ*pct)+' '+circ+'"/>'
  +'<text x="'+cxy+'" y="'+cxy+'" transform="rotate(90 '+cxy+' '+cxy+')" text-anchor="middle" dominant-baseline="central" fill="#e9d6ab" font-family="Assistant" font-weight="800" font-size="'+(size*0.24)+'">'+val+(unit||"")+'</text>'
  +'</svg>'+(label?'<div class="rl">'+label+'</div>':"")+'</div>';
}

function showLogin(r){
  var f=document.getElementById("loginform");

    +'<input id="codeIn" autocomplete="off" style="text-align:center;letter-spacing:6px;direction:ltr;text-transform:uppercase" maxlength="6">'
    +'<div class="err" id="lerr"></div><button class="btn" style="width:100%" onclick="tryClient()">כניסה</button></div>';
  }

function tryCoach(){
  var p=gv("pinIn");
  getPin().then(function(pin){
    if(p && p===pin){ role="coach"; view="dash"; saveSession(); track("login",{method:"pin",role:"coach"}); animNext=true; render(); }
    else{ track("login_failed",{role:"coach"}); var e=document.getElementById("lerr"); if(e) e.textContent="קוד שגוי, נסה שוב"; }
  });
}
function tryClient(){
  var code=gv("codeIn").toUpperCase();
  var found=null;
  for(var i=0;i<db.clients.length;i++) if(db.clients[i].code===code) found=db.clients[i];
  if(found){ role="client"; myId=found.id; view="chome"; saveSession(); track("login",{method:"code",role:"client"}); animNext=true; render(); }
  else{ track("login_failed",{role:"client"}); var e=document.getElementById("lerr"); if(e) e.textContent="קוד לא נמצא, בדוק מול המאמן"; }
}

/* =============== render root =============== */
var animNext=true; /* entrance animations: only when navigating, not on data refresh */
function render(){
  var root=document.getElementById("root");

}

function bmi(c){
  var h=parseFloat(c.height), w=c.weights.length? c.weights[c.weights.length-1].kg:0;
  if(!h||!w) return null;
  return (w/Math.pow(h/100,2)).toFixed(1);
}
var ACT=[["\u05d9\u05d5\u05e9\u05d1\u05e0\u05d9 (\u05e2\u05d1\u05d5\u05d3\u05d4 \u05de\u05e9\u05e8\u05d3\u05d9\u05ea, \u05dc\u05dc\u05d0 \u05d0\u05d9\u05de\u05d5\u05e0\u05d9\u05dd)","1.2"],["\u05e4\u05e2\u05d9\u05dc\u05d5\u05ea \u05e7\u05dc\u05d4 (1-2 \u05d0\u05d9\u05de\u05d5\u05e0\u05d9\u05dd \u05d1\u05e9\u05d1\u05d5\u05e2)","1.375"],["\u05e4\u05e2\u05d9\u05dc\u05d5\u05ea \u05d1\u05d9\u05e0\u05d5\u05e0\u05d9\u05ea (3-4 \u05d0\u05d9\u05de\u05d5\u05e0\u05d9\u05dd)","1.55"],["\u05e4\u05e2\u05d9\u05dc\u05d5\u05ea \u05d2\u05d1\u05d5\u05d4\u05d4 (5-6 \u05d0\u05d9\u05de\u05d5\u05e0\u05d9\u05dd)","1.725"],["\u05d0\u05ea\u05dc\u05d8 / \u05e2\u05d1\u05d5\u05d3\u05d4 \u05e4\u05d9\u05d6\u05d9\u05ea","1.9"]];
function actLabel(f){ for(var i=0;i<ACT.length;i++) if(ACT[i][1]===f) return ACT[i][0]; return "\u2014"; }
/* Mifflin-St Jeor */
function bmrCalc(c){
  var w=c.weights.length? c.weights[c.weights.length-1].kg:0;
  var ht=parseFloat(c.height), a=parseFloat(c.age);
  if(!w||!ht||!a||!c.sex) return null;
  return Math.round(10*w + 6.25*ht - 5*a + (c.sex==="\u05d6\u05db\u05e8"? 5 : -161));
}
function tdeeCalc(c){
  var b=bmrCalc(c), f=parseFloat(c.activity);
  if(!b||!f) return null;
  return Math.round(b*f);
}
function calSuggest(c){
  var t=tdeeCalc(c); if(!t) return null;
  if((c.goal||"").indexOf("\u05d9\u05e8\u05d9\u05d3\u05d4")===0) return {v:t-400, why:"\u05d2\u05d9\u05e8\u05e2\u05d5\u05df \u05e9\u05dc \u05db-400 \u05e7\u05dc\u05d5\u05e8\u05d9\u05d5\u05ea \u05dc\u05d9\u05e8\u05d9\u05d3\u05d4 \u05d4\u05d3\u05e8\u05d2\u05ea\u05d9\u05ea"};
  if((c.goal||"").indexOf("\u05e2\u05dc\u05d9\u05d9\u05d4")===0) return {v:t+250, why:"\u05e2\u05d5\u05d3\u05e3 \u05e9\u05dc \u05db-250 \u05e7\u05dc\u05d5\u05e8\u05d9\u05d5\u05ea \u05dc\u05d1\u05e0\u05d9\u05d9\u05ea \u05e9\u05e8\u05d9\u05e8 \u05e0\u05e7\u05d9\u05d9\u05d4"};
  return {v:t, why:"\u05e9\u05de\u05d9\u05e8\u05d4 \u05e2\u05dc \u05d4\u05de\u05e9\u05e7\u05dc \u05d4\u05e0\u05d5\u05db\u05d7\u05d9"};

function weightChart(ws){
  var W=640,H=190,P=32;
  var kgs=ws.map(function(w){return w.kg;});
  var min=Math.min.apply(null,kgs)-1, max=Math.max.apply(null,kgs)+1;
  function x(i){ return P+(W-2*P)*(ws.length===1?0.5:i/(ws.length-1)); }
  function y(v){ return H-P-(H-2*P)*((v-min)/((max-min)||1)); }
  var pts=ws.map(function(w,i){return x(i)+","+y(w.kg);}).join(" ");
  var grid=[0,.5,1].map(function(f){ var v=min+(max-min)*f;
    return '<line x1="'+P+'" x2="'+(W-P)+'" y1="'+y(v)+'" y2="'+y(v)+'" stroke="#232935"/><text x="'+(W-P+4)+'" y="'+(y(v)+4)+'" fill="#8a8272" font-size="10">'+v.toFixed(1)+'</text>'; }).join("");
  return '<svg class="chart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" direction="ltr">'
  +'<defs><linearGradient id="fg" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8a6a33"/><stop offset=".5" stop-color="#c9a35f"/><stop offset="1" stop-color="#eedfb4"/></linearGradient></defs>'
  +grid+'<polyline points="'+pts+'" pathLength="1" fill="none" stroke="url(#fg)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>'
  +ws.map(function(w,i){return '<circle style="--i:'+i+'" cx="'+x(i)+'" cy="'+y(w.kg)+'" r="4" fill="#13161b" stroke="#c9a35f" stroke-width="2.5"/>';}).join("")+'</svg>';
}

    +'<div class="exline mut" style="margin-bottom:4px"><span>תרגיל</span><span>סטים</span><span>חזרות</span><span>משקל</span><span></span></div>'
    + d.exercises.map(function(e,ei){ return '<div class="exline">'
      +'<input value="'+esc(e.name)+'" onchange="exSet('+di+','+ei+',\'name\',this.value)">'
      +'<input value="'+esc(e.sets)+'" onchange="exSet('+di+','+ei+',\'sets\',this.value)">'
      +'<input value="'+esc(e.reps)+'" onchange="exSet('+di+','+ei+',\'reps\',this.value)">'
      +'<input value="'+esc(e.weight)+'" onchange="exSet('+di+','+ei+',\'weight\',this.value)">'
      +'<button class="xdel" onclick="exDel('+di+','+ei+')">✕</button></div>'; }).join("")
    +'<button class="btn ghost sm" style="margin-top:6px" onclick="exAdd('+di+')">+ תרגיל</button></div>'; }).join("")
  +'<button class="btn" onclick="wAddDay()">+ יום אימון</button>'
  +(!c.workout.length? '<div class="empty" style="margin-top:20px"><b>אין עדיין תוכנית אימונים</b>הוסף יום אימון ובנה את התוכנית, המתאמן יראה אותה בפורטל שלו</div>':'');
}
function wAddDay(){ mutateClient(function(c){ c.workout.push({day:"יום "+String.fromCharCode(1488+c.workout.length), focus:"", exercises:[{name:"",sets:"4",reps:"8-10",weight:""}]}); }); }
function wDelDay(i){ mutateClient(function(c){ c.workout.splice(i,1); }); }
function wSet(i,f,v){ mutateClient(function(c){ if(c.workout[i]) c.workout[i][f]=v; }); }
function exAdd(i){ mutateClient(function(c){ if(c.workout[i]) c.workout[i].exercises.push({name:"",sets:"",reps:"",weight:""}); }); }
function exDel(i,j){ mutateClient(function(c){ if(c.workout[i]) c.workout[i].exercises.splice(j,1); }); }
function exSet(i,j,f,v){ mutateClient(function(c){ if(c.workout[i]&&c.workout[i].exercises[j]) c.workout[i].exercises[j][f]=v; }); }

function vNutritionEdit(c){
  var n=c.nutrition;
  var bmr=bmrCalc(c), td=tdeeCalc(c), sg=calSuggest(c);
  return (td? '<div class="card gold" style="margin-bottom:14px"><div class="sect" style="margin-top:0">'+IC.flame+'חישוב אנרגטי אוטומטי</div>'
  +'<div class="grid g3"><div><div class="mut">BMR (מנוחה)</div><div class="num" style="font-size:22px;color:var(--goldhi)">'+bmr+'</div></div>'
  +'<div><div class="mut">TDEE (הוצאה יומית)</div><div class="num" style="font-size:22px;color:var(--goldhi)">'+td+'</div></div>'
  +'<div><div class="mut">יעד מומלץ לפי המטרה</div><div class="num" style="font-size:22px;background:var(--fire);-webkit-background-clip:text;background-clip:text;color:transparent">'+sg.v+'</div></div></div>'
  +'<div class="mut" style="margin-top:8px">'+sg.why+' · נוסחת Mifflin-St Jeor</div>'
  +'<button class="btn ghost sm" style="margin-top:10px" onclick="nSet(\'calories\',\''+sg.v+'\')">הזן כיעד קלורי ←</button></div>'
  : '<div class="card" style="margin-bottom:14px"><span class="mut">לחישוב BMR ו-TDEE אוטומטי חסרים נתונים בשאלון: משקל, גובה, גיל, מין ורמת פעילות</span></div>')
  +'<div class="card gold" style="margin-bottom:14px"><div class="sect" style="margin-top:0">'+IC.apple+'יעדים יומיים</div>'
  +'<div class="frow">'
  +'<div><label>קלוריות</label><input value="'+esc(n.calories)+'" inputmode="numeric" onchange="nSet(\'calories\',this.value)"></div>'
  +'<div><label>חלבון (גרם)</label><input value="'+esc(n.protein)+'" inputmode="numeric" onchange="nSet(\'protein\',this.value)"></div>'
  +'<div><label>פחמימה (גרם)</label><input value="'+esc(n.carbs)+'" inputmode="numeric" onchange="nSet(\'carbs\',this.value)"></div>'
  +'<div><label>שומן (גרם)</label><input value="'+esc(n.fat)+'" inputmode="numeric" onchange="nSet(\'fat\',this.value)"></div></div></div>'
  +'<div class="card"><div class="sect" style="margin-top:0">'+IC.apple+'תפריט יומי</div>'
  +(n.meals.length? '<div class="mealline mut" style="margin-bottom:4px"><span>ארוחה</span><span>פירוט</span><span></span></div>':'')
  + n.meals.map(function(m,i){ return '<div class="mealline">'
    +'<input value="'+esc(m.name)+'" onchange="mSet('+i+',\'name\',this.value)">'
    +'<input value="'+esc(m.items)+'" placeholder="מרכיבים וכמויות" onchange="mSet('+i+',\'items\',this.value)">'
    +'<button class="xdel" onclick="mDel('+i+')">✕</button></div>'; }).join("")
  +'<button class="btn ghost sm" style="margin-top:6px" onclick="mAdd()">+ ארוחה</button>'
  +(!n.meals.length? '<div class="empty"><b>אין עדיין תפריט</b>הגדר יעדים והוסף ארוחות</div>':'')+'</div>';
}
function nSet(f,v){ mutateClient(function(c){ c.nutrition[f]=v; }); }
function mAdd(){ mutateClient(function(c){ var names=["בוקר","ביניים","צהריים","לפני אימון","ערב"]; c.nutrition.meals.push({name:"ארוחת "+(names[c.nutrition.meals.length]||""), items:""}); }); }
function mDel(i){ mutateClient(function(c){ c.nutrition.meals.splice(i,1); }); }
function mSet(i,f,v){ mutateClient(function(c){ if(c.nutrition.meals[i]) c.nutrition.meals[i][f]=v; }); }

/* ################ CLIENT ################ */
function rClientShell(){
  var c=C();
  if(!c){ logout(); return ""; }
  var nav=[["chome","הבית שלי",IC.dash],["ccheckin","צ'ק-אין",IC.heart],["cworkout","האימונים שלי",IC.dumb],["cnutrition","התזונה שלי",IC.apple],["cprofile","הפרופיל שלי",IC.profile]];
  var body = view==="chome"?kHome(c) : view==="ccheckin"?vCheckin(c) : view==="cworkout"?kWorkout(c) : view==="cnutrition"?kNutrition(c) : view==="cprofile"?kProfile(c) : kHome(c);
  return '<div class="app"><aside class="side">'
  +'<div class="logoline"><img src="'+LOGO+'" alt=""><div><div class="brand">COACH MEDINA</div></div></div>'
  +'<div class="tag">UNLEASH YOUR BEAST</div><div class="sidesep"></div>'
  + nav.map(function(n){ return '<button class="navbtn'+(n[0]===view?" on":"")+'" onclick="go(\''+n[0]+'\')">'+n[2]+n[1]+'</button>'; }).join("")
  +'<button class="navbtn" onclick="logout()">'+IC.exit+'יציאה</button>'
  +'<div class="foot">המאמן שלך: <b>נתנאל מדינה</b><br><span dir="ltr">'+PHONE+'</span><br><span dir="ltr">@'+IG+'</span>'+syncBadge()+'</div>'
  +'</aside><main class="main">'+body+'</main></div>';
}
function kHome(c){
  var intakeBanner=c.intakeDone? "" :
    '<div class="card gold" style="margin-bottom:14px"><b style="color:var(--goldhi)">שלב ראשון:</b> מלא את שאלון הפתיחה כדי שהמאמן יבנה לך תוכנית מדויקת. <button class="btn sm" style="margin-inline-start:10px" onclick="go(\'cprofile\')">לשאלון</button></div>';
  return '<div class="head"><div><div class="eyebrow">My Zone</div><h1>שלום, '+esc(c.name.split(" ")[0])+' 🔥</h1><div class="sub">כאן אתה מזין נתונים, והמאמן רואה הכל בזמן אמת</div></div></div>'
  + intakeBanner
  + vOverview(c,false)
  +'<div class="sect">'+IC.scale+'שקילה, מעקב ושיאים</div>'
  + vProgress(c);
}
function kWorkout(c){
  return '<div class="head"><div><div class="eyebrow">Training</div><h1>תוכנית האימונים שלך</h1><div class="sub">נבנתה עבורך על ידי המאמן</div></div></div>'
  +(c.workout.length? c.workout.map(function(d){
    return '<div class="planblock"><h3>'+esc(d.day)+'</h3><span class="mut">'+esc(d.focus)+'</span>'
    +'<div style="overflow-x:auto"><table><tr><th>תרגיל</th><th>סטים</th><th>חזרות</th><th>משקל</th></tr>'
    + d.exercises.map(function(e){ return '<tr><td><b>'+esc(e.name)+'</b></td><td>'+esc(e.sets)+'</td><td>'+esc(e.reps)+'</td><td>'+esc(e.weight)+'</td></tr>'; }).join("")
    +'</table></div></div>'; }).join("")
  :'<div class="card"><div class="empty"><b>התוכנית בבנייה</b>המאמן יעלה לך תוכנית בקרוב</div></div>');
}
function kNutrition(c){
  var n=c.nutrition;
  var hasT=n.calories||n.protein||n.carbs||n.fat;
  return '<div class="head"><div><div class="eyebrow">Nutrition</div><h1>תוכנית התזונה שלך</h1><div class="sub">היעדים והתפריט שהמאמן בנה לך</div></div></div>'
  +(hasT? '<div class="grid g3" style="margin-bottom:14px">'
    +'<div class="card gold stat hot"><div><div class="num">'+esc(n.calories||"—")+'</div><div class="lbl">קלוריות ליום</div></div></div>'
    +'<div class="card gold stat"><div><div class="num">'+esc(n.protein||"—")+'</div><div class="lbl">חלבון (גרם)</div></div></div>'
    +'<div class="card gold stat"><div><div class="num">'+esc(n.carbs||"—")+' / '+esc(n.fat||"—")+'</div><div class="lbl">פחמימה / שומן</div></div></div></div>':'')
  +(n.meals.length? '<div class="card"><table><tr><th>ארוחה</th><th>פירוט</th></tr>'
    + n.meals.map(function(m){ return '<tr><td><b>'+esc(m.name)+'</b></td><td>'+esc(m.items)+'</td></tr>'; }).join("")+'</table></div>'
  :'<div class="card"><div class="empty"><b>התפריט בבנייה</b>המאמן יעלה לך תפריט בקרוב</div></div>');
}
function kProfile(c){
  return '<div class="head"><div><div class="eyebrow">Intake</div><h1>שאלון פתיחה</h1><div class="sub">מלא בכנות, זה הבסיס לתוכנית שלך</div></div></div>'
  +'<div class="card gold">'
  +'<div class="frow">'
  +'<div><label>טלפון</label><input id="p_phone" inputmode="tel" value="'+esc(c.phone)+'"></div>'
  +'<div><label>גיל</label><input id="p_age" type="number" inputmode="numeric" value="'+esc(c.age)+'"></div>'
  +'<div><label>גובה (ס"מ)</label><input id="p_height" type="number" inputmode="numeric" value="'+esc(c.height)+'"></div>'
  +'<div><label>משקל נוכחי (ק"ג)</label><input id="p_weight" type="number" inputmode="decimal" step="0.1"></div>'
  +'<div><label>מין</label><select id="p_sex"><option value="">בחר...</option>'+["זכר","נקבה"].map(function(o){return '<option'+(c.sex===o?" selected":"")+'>'+o+'</option>';}).join("")+'</select></div>'
  +'<div><label>רמת פעילות יומית</label><select id="p_act"><option value="">בחר...</option>'+ACT.map(function(a){return '<option value="'+a[1]+'"'+(c.activity===a[1]?" selected":"")+'>'+a[0]+'</option>';}).join("")+'</select></div>'
  +'<div><label>ניסיון באימונים</label><select id="p_exp">'+["מתחיל","בינוני","מתקדם"].map(function(o){return '<option'+(c.exp===o?" selected":"")+'>'+o+'</option>';}).join("")+'</select></div>'
  +'<div><label>כמה אימונים בשבוע תתחייב?</label><input id="p_freq" type="number" inputmode="numeric" min="1" max="7" value="'+esc(c.freq||"3")+'"></div></div>'
  +'<div style="margin-bottom:12px"><label>פציעות, מגבלות רפואיות, תרופות</label><textarea id="p_med" rows="2">'+esc(c.medical)+'</textarea></div>'
  +'<div style="margin-bottom:12px"><label>הרגלי תזונה (ארוחות ביום, רגישויות, מאכלים שאתה לא אוכל)</label><textarea id="p_food" rows="2">'+esc(c.food)+'</textarea></div>'
  +'<div style="margin-bottom:16px"><label>משהו נוסף שחשוב שהמאמן ידע</label><textarea id="p_notes" rows="2">'+esc(c.notes)+'</textarea></div>'
  +'<button class="btn" onclick="saveProfile()">'+(c.intakeDone?"עדכן פרטים":"שלח למאמן")+'</button></div>';
}
function saveProfile(){
  /* capture form values BEFORE mutateClient — fn re-runs inside the transaction after the DOM is gone */
  var w=parseFloat(gv("p_weight"));
  var p={phone:gv("p_phone"), age:gv("p_age"), height:gv("p_height"),
    exp:gv("p_exp"), freq:gv("p_freq"), medical:gv("p_med"), food:gv("p_food"), notes:gv("p_notes"),
    sex:gv("p_sex"), activity:gv("p_act")};
  mutateClient(function(c){
    c.phone=p.phone; c.age=p.age; c.height=p.height;
    c.exp=p.exp; c.freq=p.freq; c.medical=p.medical; c.food=p.food; c.notes=p.notes;
    c.sex=p.sex; c.activity=p.activity;
    if(w>0 && !c.weights.length) c.weights.push({date:today(), kg:w});
    c.intakeDone=true;
  }).then(function(){ toast("הפרטים נשלחו למאמן 🔥"); go("chome"); });
}

window.addEventListener("error",function(){});
boot();
/* PWA service worker — installable + offline; self-updates on each deploy */
if("serviceWorker" in navigator){
  window.addEventListener("load",function(){
    navigator.serviceWorker.register("sw.js").then(function(reg){
      reg.update();
      if(reg.waiting) reg.waiting.postMessage("SKIP_WAITING");
    }).catch(function(){});
  });
}
</script>
</body>
</html>
